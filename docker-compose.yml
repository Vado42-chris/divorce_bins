version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - .:/app
      - ./metadata:/app/metadata
      - ./evidence:/app/evidence
    environment:
      - NODE_ENV=production
    restart: always

  ollama:
    image: ollama/ollama
    deploy:
      resources:
        limits:
          memory: 8G
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
